name = "nayem-portfolio"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist/public"

[[kv_namespaces]]
binding = "PORTFOLIO_KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_NAMESPACE_PREVIEW_ID"

# Set your admin password as an encrypted environment variable in the Cloudflare Pages dashboard:
# Settings → Environment variables → Add variable → ADMIN_PASSWORD
# Use any strong password you want — this is both your login password and the JWT signing key.
