name = "nayem-portfolio"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist/public"

[[kv_namespaces]]
binding = "PORTFOLIO_KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_NAMESPACE_PREVIEW_ID"

# Do NOT add JWT_SECRET here.
# Set it as an encrypted environment variable in the Cloudflare Pages dashboard:
# Settings → Environment variables → Add variable → JWT_SECRET
# Generate a strong value with: openssl rand -base64 32
